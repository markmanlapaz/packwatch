<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3ea5" />
      <stop offset="22%" stop-color="#8a5cff" />
      <stop offset="50%" stop-color="#35f0e5" />
      <stop offset="74%" stop-color="#7dffb4" />
      <stop offset="100%" stop-color="#ffb347" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0f2e" />
      <stop offset="100%" stop-color="#06020c" />
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bgGlow)" />

  <!-- Holo card silhouette -->
  <rect x="148" y="96" width="216" height="304" rx="16"
        fill="none" stroke="url(#holo)" stroke-width="6" opacity="0.95" />
  <rect x="172" y="124" width="168" height="180" rx="6"
        fill="url(#holo)" opacity="0.18" />

  <!-- Concentric pulse — the "watch" beat -->
  <circle cx="256" cy="214" r="36" fill="none" stroke="url(#holo)" stroke-width="4" />
  <circle cx="256" cy="214" r="14" fill="#35f0e5" opacity="0.85" />

  <!-- PW monogram -->
  <text x="256" y="372" text-anchor="middle"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="58" font-weight="700"
        fill="url(#holo)" letter-spacing="6">PW</text>
</svg>
